<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SV Unless 2026</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@200;400;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-color: #000000;
            /* Ultra-clear glass fill */
            --glass-fill: linear-gradient(135deg, rgba(255, 255, 255, 0.05), rgba(255, 255, 255, 0.01)); 
            --theme-color: rgba(255, 0, 0, 0.5); 
            --accent-yellow: #fff200; 
            --accent-blue: #00d4ff;   
            --glow-yellow: rgba(255, 242, 0, 0.9); 
            --glow-blue: rgba(0, 212, 255, 0.9);
            --morph-speed: 0.8s;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            background-color: var(--bg-color);
            font-family: 'Montserrat', sans-serif;
            color: white;
        }

        #vanta-canvas {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1;
            transition: filter 1s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .app-shell {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 2;
            display: flex; justify-content: center; align-items: center;
            padding: 20px;
        }

        .liquid-node {
            position: relative;
            width: 230px; height: 230px;
            background: var(--glass-fill);
            backdrop-filter: blur(25px) saturate(160%);
            -webkit-backdrop-filter: blur(25px) saturate(160%);
            border: 2.5px solid var(--theme-color); 
            border-radius: 50%;
            display: flex; flex-direction: column;
            transition: all var(--morph-speed) cubic-bezier(0.6, 0.05, 0.01, 1), border 0.8s ease;
            overflow: hidden;
            box-shadow: 0 30px 60px rgba(0,0,0,0.8), 
                        inset 0 0 40px rgba(255,255,255,0.05);
            animation: float 4s ease-in-out infinite;
        }

        .liquid-node.expanded {
            width: 100%; height: 90vh;
            max-width: 480px;
            border-radius: 40px;
            animation: none;
            padding: 40px 25px;
        }

        .view-step { 
            display: none; 
            width: 100%; height: 100%; 
            flex-direction: column; 
            z-index: 1;
            opacity: 0;
            transform: scale(0.95) translateY(10px);
            filter: blur(10px);
            transition: opacity 0.5s ease, transform 0.6s cubic-bezier(0.2, 1, 0.3, 1), filter 0.5s ease;
        }

        .view-step.active-view { 
            display: flex; 
            opacity: 1;
            transform: scale(1) translateY(0);
            filter: blur(0px);
        }

        #view-home { justify-content: center; align-items: center; text-align: center; cursor: pointer; }

        .bubble-item {
            position: relative;
            border-radius: 25px;
            display: flex; align-items: center; justify-content: center;
            text-transform: uppercase;
            transition: all 0.3s ease;
            font-weight: 400; cursor: pointer;
            margin-bottom: 15px;
            overflow: hidden;
            background: rgba(255, 255, 255, 0.02); /* Clear background for all */
        }

        /* Yellow Section: Clear with Yellow Glow Border */
        .glass-yellow {
            border: 2px solid var(--accent-yellow);
            color: var(--accent-yellow);
            text-shadow: 0 0 15px var(--glow-yellow);
            box-shadow: inset 0 0 10px rgba(255, 242, 0, 0.1);
        }

        /* Blue Section: Clear with Blue Glow Border */
        .glass-blue {
            border: 2px solid var(--accent-blue);
            color: var(--accent-blue);
            text-shadow: 0 0 15px var(--glow-blue);
            box-shadow: inset 0 0 10px rgba(0, 212, 255, 0.1);
        }

        .bubble-item:active { transform: scale(0.95); filter: brightness(1.3); }

        .size-huge { height: 35%; font-size: 1.8rem; letter-spacing: 8px; border: none; background: transparent; pointer-events: none; color: white; }
        .size-med { height: 20%; font-size: 1.1rem; letter-spacing: 5px; }

        .nav-back {
            align-self: flex-start;
            background: rgba(255,255,255,0.03);
            border: 1.5px solid var(--theme-color);
            border-radius: 50px;
            color: white; font-family: inherit; font-size: 0.7rem; font-weight: 600;
            text-transform: uppercase; letter-spacing: 3px;
            margin-bottom: 30px; padding: 12px 25px;
            cursor: pointer;
            transition: all 0.4s ease;
            display: flex; align-items: center; gap: 8px;
        }
        
        .nav-back:active { background: white; color: black; }

        .dynamic-title { 
            margin-top: 20%; 
            font-size: 2.8rem; 
            font-weight: 200; 
            letter-spacing: 12px; 
            text-transform: uppercase; 
            text-align: center;
        }

        @keyframes float { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-10px); } }
        
        .shimmer {
            position: absolute; top: 0; left: -100%;
            width: 70%; height: 100%;
            background: linear-gradient(to right, transparent, rgba(255,255,255,0.15), transparent);
            transform: skewX(-30deg);
            animation: shine 7s infinite;
            pointer-events: none; z-index: 0;
        }
        @keyframes shine { 0% { left: -150%; } 20% { left: 250%; } 100% { left: 250%; } }

    </style>
</head>
<body>

    <div id="vanta-canvas"></div>

    <div class="app-shell">
        <div class="liquid-node" id="main-node">
            <div class="shimmer"></div> 

            <div id="view-home" class="view-step active-view" onclick="openDash()" style="display: flex;">
                <span style="font-weight: 400; letter-spacing: 8px; font-size: 1rem; text-transform: uppercase;">Unless 2026</span>
            </div>

            <div id="view-dash" class="view-step">
                <div class="bubble-item size-huge">Unless 2026</div>
                <div class="bubble-item size-med glass-yellow" onclick="navTo('sub1')">Literacy</div>
                <div class="bubble-item size-med glass-blue" onclick="navTo('sub2')">Stem</div>
            </div>

            <div id="view-content" class="view-step">
                <button class="nav-back" onclick="navBack()"><span>←</span> BACK</button>
                <div class="dynamic-title" id="content-title"></div>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.topology.min.js"></script>

    <script>
        let vantaEffect;

        function setVanta(color = 0xff0000) {
            if (vantaEffect) vantaEffect.destroy();
            vantaEffect = VANTA.TOPOLOGY({
                el: "#vanta-canvas",
                mouseControls: false, 
                touchControls: true,
                scale: 2.2, scaleMobile: 1.0,
                color: color,
                backgroundColor: 0x0,
                speed: 3.0 
            });
            
            const hexColor = '#' + color.toString(16).padStart(6, '0');
            document.documentElement.style.setProperty('--theme-color', hexColor + '99'); 
        }

        setVanta(0xff0000);

        const node = document.getElementById('main-node');
        const views = {
            home: document.getElementById('view-home'),
            dash: document.getElementById('view-dash'),
            content: document.getElementById('view-content')
        };

        function performTransition(outView, inView, vantaColor) {
            outView.classList.remove('active-view');
            document.getElementById('vanta-canvas').style.filter = 'blur(15px)';

            setTimeout(() => {
                outView.style.display = 'none';
                if(vantaColor !== null) setVanta(vantaColor);
                inView.style.display = 'flex';
                
                setTimeout(() => {
                    inView.classList.add('active-view');
                    document.getElementById('vanta-canvas').style.filter = 'blur(0px)';
                }, 50);

            }, 400); 
        }

        function openDash() {
            node.classList.add('expanded');
            performTransition(views.home, views.dash, null);
        }

        function navTo(page) {
            const isSub1 = (page === 'sub1');
            const color = isSub1 ? 0xfff200 : 0x00d4ff;
            const titleText = isSub1 ? "Literacy" : "Stem";
            
            const titleEl = document.getElementById('content-title');
            titleEl.innerText = titleText;
            titleEl.style.color = isSub1 ? 'var(--accent-yellow)' : 'var(--accent-blue)';
            titleEl.style.textShadow = isSub1 ? '0 0 30px var(--glow-yellow)' : '0 0 30px var(--glow-blue)';

            performTransition(views.dash, views.content, color);
        }

        function navBack() {
            performTransition(views.content, views.dash, 0xff0000);
        }
    </script>
</body>
</html>
