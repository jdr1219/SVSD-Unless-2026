<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SV Unless 2026</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@200;400;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-color: #000000;
            --glass-fill: linear-gradient(135deg, rgba(255, 255, 255, 0.05), rgba(255, 255, 255, 0.01)); 
            --theme-color: rgba(255, 0, 0, 0.5); 
            --accent-yellow: #fff200; 
            --accent-blue: #00d4ff;   
            --accent-white: #ffffff;
            --glow-yellow: rgba(255, 242, 0, 0.9); 
            --glow-blue: rgba(0, 212, 255, 0.9);
            --glow-white: rgba(255, 255, 255, 0.8);
            --morph-speed: 0.8s;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            background-color: #1a0000; 
            font-family: 'Montserrat', sans-serif;
            color: white;
        }

        #vanta-canvas {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1;
            transition: filter 1s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .app-shell {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 2;
            display: flex; justify-content: center; align-items: center;
            padding: 20px;
        }

        .liquid-node {
            position: relative;
            width: 230px; height: 230px;
            background: var(--glass-fill);
            backdrop-filter: blur(25px) saturate(160%);
            -webkit-backdrop-filter: blur(25px) saturate(160%);
            border: 2.5px solid var(--theme-color); 
            border-radius: 50%;
            display: flex; flex-direction: column;
            transition: all var(--morph-speed) cubic-bezier(0.6, 0.05, 0.01, 1), border 0.8s ease;
            overflow: hidden;
            box-shadow: 0 30px 60px rgba(0,0,0,0.8), inset 0 0 40px rgba(255,255,255,0.05);
            animation: float 4s ease-in-out infinite;
        }

        .liquid-node.expanded {
            width: 100%; height: 90vh;
            max-width: 480px;
            border-radius: 40px;
            animation: none;
            padding: 40px 25px;
        }

        .view-step { 
            display: none; width: 100%; height: 100%; 
            flex-direction: column; z-index: 1;
            opacity: 0; transform: scale(0.95) translateY(10px); filter: blur(10px);
            transition: opacity 0.5s ease, transform 0.6s cubic-bezier(0.2, 1, 0.3, 1), filter 0.5s ease;
        }

        .view-step.active-view { display: flex; opacity: 1; transform: scale(1) translateY(0); filter: blur(0px); }

        #view-home { justify-content: center; align-items: center; text-align: center; cursor: pointer; }

        /* Click Me Style */
        .click-me {
            font-size: 0.6rem; letter-spacing: 2px; text-transform: uppercase;
            margin-top: 15px; opacity: 0.5; font-weight: 600;
            animation: breathe 2s ease-in-out infinite;
        }

        .bubble-item {
            position: relative; border-radius: 25px;
            display: flex; align-items: center; justify-content: center;
            text-transform: uppercase; transition: all 0.3s ease;
            font-weight: 400; cursor: pointer; margin-bottom: 12px;
            background: rgba(255, 255, 255, 0.02); flex-shrink: 0;
        }

        .glass-yellow { border: 2px solid var(--accent-yellow); color: var(--accent-yellow); text-shadow: 0 0 15px var(--glow-yellow); }
        .glass-blue { border: 2px solid var(--accent-blue); color: var(--accent-blue); text-shadow: 0 0 15px var(--glow-blue); }
        .glass-white { border: 2px solid var(--accent-white); color: var(--accent-white); text-shadow: 0 0 15px var(--glow-white); }

        .bubble-item:active { transform: scale(0.95); filter: brightness(1.3); }

        .size-huge { height: 20%; font-size: 1.8rem; letter-spacing: 8px; border: none; background: transparent; pointer-events: none; color: white; margin-bottom: 15px; text-align: center; display: flex; align-items: center; justify-content: center;}
        .size-med { height: 12%; font-size: 0.9rem; letter-spacing: 4px; }

        .nav-back {
            align-self: flex-start; background: rgba(255,255,255,0.03);
            border: 1.5px solid var(--theme-color); border-radius: 50px;
            color: white; font-family: inherit; font-size: 0.7rem; font-weight: 600;
            text-transform: uppercase; letter-spacing: 3px;
            margin-bottom: 20px; padding: 10px 20px; cursor: pointer;
            display: flex; align-items: center; gap: 8px;
        }
        
        .dynamic-title { margin-top: 10%; font-size: 2.2rem; font-weight: 200; letter-spacing: 10px; text-transform: uppercase; text-align: center; margin-bottom: 20px;}

        #poster-img { width: 100%; border-radius: 15px; border: 1px solid rgba(255,255,255,0.2); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }

        @keyframes float { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-10px); } }
        @keyframes breathe { 0%, 100% { opacity: 0.3; transform: scale(0.95); } 50% { opacity: 0.8; transform: scale(1); } }
    </style>
</head>
<body>

    <div id="vanta-canvas"></div>

    <div class="app-shell">
        <div class="liquid-node" id="main-node">
            
            <div id="view-home" class="view-step active-view" onclick="openDash()" style="display: flex;">
                <span style="font-weight: 400; letter-spacing: 8px; font-size: 1rem; text-transform: uppercase;">Unless 2026</span>
                <div class="click-me">Click Me</div>
            </div>

            <div id="view-dash" class="view-step">
                <div class="bubble-item size-huge">Unless 2026</div>
                <div class="bubble-item size-med glass-white" onclick="navToFolder('main')">Main</div>
                <div class="bubble-item size-med glass-yellow" onclick="navToFolder('literacy')">Literacy</div>
                <div class="bubble-item size-med glass-blue" onclick="navToFolder('stem')">Stem</div>
            </div>

            <div id="view-main" class="view-step">
                <button class="nav-back" onclick="navBack('dash')">← BACK</button>
                <div class="bubble-item size-huge" style="color: var(--accent-white); text-shadow: 0 0 20px var(--glow-white);">Main</div>
                <div class="bubble-item size-med glass-white" onclick="openContent('Main Poster', 'main', true)">Main Poster</div>
            </div>

            <div id="view-literacy" class="view-step">
                <button class="nav-back" onclick="navBack('dash')">← BACK</button>
                <div class="bubble-item size-huge" style="color: var(--accent-yellow); text-shadow: 0 0 20px var(--glow-yellow);">Literacy</div>
                <div class="bubble-item size-med glass-yellow" onclick="openContent('Research', 'literacy')">Research</div>
                <div class="bubble-item size-med glass-yellow" onclick="openContent('Story', 'literacy')">Story</div>
                <div class="bubble-item size-med glass-yellow" onclick="openContent('Inspiration', 'literacy')">Inspiration</div>
            </div>

            <div id="view-stem" class="view-step">
                <button class="nav-back" onclick="navBack('dash')">← BACK</button>
                <div class="bubble-item size-huge" style="color: var(--accent-blue); text-shadow: 0 0 20px var(--glow-blue);">Stem</div>
                <div class="bubble-item size-med glass-blue" onclick="openContent('Habitat Loss Simulator', 'stem')">Habitat Loss Simulator</div>
                <div class="bubble-item size-med glass-blue" onclick="openContent('Make-a-choice', 'stem')">Make-a-choice</div>
                <div class="bubble-item size-med glass-blue" onclick="openContent('Enviroscape', 'stem')">Enviroscape</div>
            </div>

            <div id="view-content" class="view-step">
                <button class="nav-back" id="content-back">← BACK</button>
                <div class="dynamic-title" id="content-title"></div>
                <div id="content-body" style="width: 100%; display: flex; justify-content: center;">
                    </div>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.topology.min.js"></script>

    <script>
        let vantaEffect;

        function setVanta(color = 0xff0000, bgColor = 0x110000) {
            if (vantaEffect) vantaEffect.destroy();
            vantaEffect = VANTA.TOPOLOGY({
                el: "#vanta-canvas",
                mouseControls: false, touchControls: true,
                scale: 2.2, scaleMobile: 1.0,
                color: color, backgroundColor: bgColor, speed: 3.0 
            });
            const hexColor = '#' + color.toString(16).padStart(6, '0');
            document.documentElement.style.setProperty('--theme-color', hexColor + '99'); 
        }

        setVanta(0xff0000, 0x110000);

        const node = document.getElementById('main-node');
        const views = {
            home: document.getElementById('view-home'),
            dash: document.getElementById('view-dash'),
            main: document.getElementById('view-main'),
            literacy: document.getElementById('view-literacy'),
            stem: document.getElementById('view-stem'),
            content: document.getElementById('view-content')
        };

        function performTransition(outView, inView, vantaColor, vantaBg) {
            outView.classList.remove('active-view');
            document.getElementById('vanta-canvas').style.filter = 'blur(15px)';
            setTimeout(() => {
                outView.style.display = 'none';
                if(vantaColor !== null) setVanta(vantaColor, vantaBg);
                inView.style.display = 'flex';
                setTimeout(() => {
                    inView.classList.add('active-view');
                    document.getElementById('vanta-canvas').style.filter = 'blur(0px)';
                }, 50);
            }, 400); 
        }

        function openDash() {
            node.classList.add('expanded');
            performTransition(views.home, views.dash, null);
        }

        function navToFolder(folder) {
            let color, bgColor;
            if (folder === 'main') { color = 0xffffff; bgColor = 0x050505; }
            else if (folder === 'literacy') { color = 0xfff200; bgColor = 0x111100; }
            else { color = 0x00d4ff; bgColor = 0x000811; }
            performTransition(views.dash, views[folder], color, bgColor);
        }

        function openContent(title, parent, isPoster = false) {
            const titleEl = document.getElementById('content-title');
            const bodyEl = document.getElementById('content-body');
            titleEl.innerText = title;
            
            // Set Color based on parent
            if (parent === 'main') titleEl.style.color = 'var(--accent-white)';
            else if (parent === 'literacy') titleEl.style.color = 'var(--accent-yellow)';
            else titleEl.style.color = 'var(--accent-blue)';

            // Clear previous content
            bodyEl.innerHTML = "";
            if (isPoster) {
                // ADDING YOUR PHOTO HERE
                bodyEl.innerHTML = `<img src="image.jpeg" id="poster-img" alt="Main Poster">`;
            }

            document.getElementById('content-back').onclick = () => performTransition(views.content, views[parent], null);
            performTransition(views[parent], views.content, null);
        }

        function navBack(target) {
            let current;
            if (views.main.style.display === 'flex') current = views.main;
            else if (views.literacy.style.display === 'flex') current = views.literacy;
            else current = views.stem;
            
            performTransition(current, views[target], 0xff0000, 0x110000);
        }
    </script>
</body>
</html>
